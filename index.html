<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARR | ذكاء بلا حدود</title>

  <!-- خطوط وأيقونات -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="" crossorigin="anonymous">

  <!-- مكتبات: marked لــ Markdown و DOMPurify للتنظيف الأمن -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js" integrity="" crossorigin="anonymous"></script>

  <style>
    :root{
      --accent: #00f2fe;
      --bg: #02040a;
      --panel: #0d1117;
      --muted: #9aa4ad;
      --text: #e6edf3;
      --glass: rgba(255,255,255,0.06);
      --radius: 12px;
    }

    *{ box-sizing: border-box; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

    html,body{ height:100%; margin:0; font-family: 'Cairo', sans-serif; background: radial-gradient(ellipse at 10% 10%, rgba(0,242,254,0.03), transparent), var(--bg); color:var(--text); }

    /* Layout */
    .app {
      display:flex;
      height:100vh;
      overflow:hidden;
      gap:18px;
      padding:20px;
    }

    .sidebar {
      width:280px;
      background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
      border-left:1px solid var(--glass);
      border-radius: 14px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:16px;
      min-width:220px;
      position:relative;
    }

    .marr-logo{
      font-weight:800;
      font-size:1.6rem;
      letter-spacing:3px;
      color:var(--accent);
      text-align:center;
      text-shadow:0 0 14px rgba(0,242,254,0.12);
    }

    .controls { display:flex; flex-direction:column; gap:10px; }

    button.btn{
      background:transparent;
      border:1px dashed var(--accent);
      color:var(--accent);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:10px;
      justify-content:center;
    }
    button.btn.solid{
      background:var(--accent);
      color:#000;
      border: none;
      box-shadow: 0 8px 24px rgba(0,242,254,0.06);
    }
    .chat-list{
      margin-top:6px;
      overflow:auto;
      display:flex;
      flex-direction:column;
      gap:8px;
      padding-right:4px;
    }

    .chat-item{
      background:transparent;
      border:1px solid transparent;
      padding:10px;
      border-radius:10px;
      color:var(--muted);
      cursor:pointer;
      font-size:0.95rem;
    }
    .chat-item.active{
      background:linear-gradient(90deg, rgba(0,242,254,0.04), rgba(0,242,254,0.02));
      color:var(--text);
      border:1px solid rgba(0,242,254,0.07);
    }

    /* Main panel */
    .main-panel{
      flex:1;
      display:flex;
      flex-direction:column;
      gap:12px;
      min-width:0;
    }

    header.app-header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 18px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
      border-bottom:1px solid var(--glass);
      backdrop-filter: blur(6px);
    }
    .status {
      display:flex;
      align-items:center;
      gap:10px;
      color:var(--muted);
      font-size:0.95rem;
    }

    .chat-area{
      flex:1;
      overflow:auto;
      padding:28px;
      display:flex;
      flex-direction:column;
      gap:18px;
      scroll-behavior:smooth;
      min-height:0;
    }

    .message{
      display:flex;
      gap:14px;
      max-width:85%;
      align-items:flex-start;
      animation:fadeIn .28s ease;
    }
    .message.you{ margin-inline-start:auto; flex-direction:row-reverse; }
    .avatar{
      width:42px; height:42px; border-radius:8px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .ai-avatar{ background:var(--accent); color:#000; box-shadow:0 8px 28px rgba(0,242,254,0.06); }
    .user-avatar{ background:#30363d; color:#fff; }

    .bubble{
      background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.005));
      padding:12px 14px;
      border-radius:10px;
      border:1px solid var(--glass);
      color:var(--text);
      line-height:1.7;
      box-shadow: 0 6px 20px rgba(2,6,12,0.5);
      overflow-wrap: break-word;
    }
    .bubble pre{ background:#0b0f13; padding:12px; border-radius:8px; overflow:auto; font-family: 'JetBrains Mono', monospace; font-size:.95rem; margin:8px 0; border:1px solid rgba(255,255,255,0.03); }

    .meta{ font-size:0.78rem; color:var(--muted); margin-top:6px; }

    .input-area{
      padding:18px;
      border-radius:12px;
      background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent);
      display:flex;
      gap:12px;
      align-items:center;
      border:1px solid var(--glass);
    }

    .input-area input[type="text"]{
      flex:1;
      background:transparent;
      border:none;
      color:var(--text);
      padding:12px;
      outline:none;
      font-size:1rem;
    }

    .send-btn{
      background:var(--accent);
      border:none;
      color:#000;
      padding:10px 14px;
      border-radius:10px;
      cursor:pointer;
      display:inline-flex;
      gap:8px;
      align-items:center;
      font-weight:700;
    }

    .typing{
      font-size:0.85rem;
      color:var(--accent);
      display:inline-block;
      min-width:120px;
    }

    .small{ font-size:0.85rem; color:var(--muted); }

    /* Settings modal */
    .modal-backdrop{
      position:fixed; inset:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:60;
    }
    .modal{
      background:var(--panel); border-radius:12px; padding:18px; width:min(560px,95%); border:1px solid var(--glass);
      box-shadow:0 12px 40px rgba(0,0,0,0.6);
    }
    .modal h3{ margin:0 0 10px 0; color:var(--accent); }
    .modal .row{ display:flex; gap:10px; margin-bottom:10px; align-items:center; }
    .modal input[type="password"], .modal input[type="text"]{ flex:1; padding:10px; border-radius:8px; border:1px solid #122; background:transparent; color:var(--text); }

    /* utilities */
    .right { text-align:right; }
    .center { text-align:center; }
    @keyframes fadeIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }

    /* Responsive */
    @media (max-width: 900px){
      .sidebar{ position:fixed; right:18px; top:18px; transform: translateX(0); z-index:70; width:86%; max-width:360px; height:calc(100vh - 36px); overflow:auto; }
      .app{ padding:12px; }
      .chat-area{ padding:16px; }
    }
    @media (max-width:600px){
      .app{ gap:8px; padding:8px; flex-direction:column; }
      .sidebar{ width:100%; height:auto; position:relative; border-radius:10px; }
    }
  </style>
</head>
<body>
  <div class="app" role="application" aria-label="MARR Chat Application">
    <aside class="sidebar" aria-label="القائمة الجانبية">
      <div class="marr-logo" aria-hidden="true">MARR</div>

      <div class="controls" role="region" aria-label="عناصر التحكم">
        <button class="btn solid" id="new-chat-btn" title="محادثة جديدة"><i class="fa-solid fa-plus"></i> محادثة جديدة</button>
        <button class="btn" id="settings-open" title="الإعدادات"><i class="fa-solid fa-gear"></i> الإعدادات</button>
        <button class="btn" id="clear-storage" title="حذف كل المحادثات"><i class="fa-solid fa-trash"></i> حذف الكل</button>
      </div>

      <div class="small right" style="margin-top:8px;">المحادثات</div>
      <div class="chat-list" id="chat-list" role="list" aria-label="قائمة المحادثات"></div>
      <div style="margin-top:auto; font-size:0.85rem; color:var(--muted); text-align:center;">نسخة محلية — ضع مفتاح API في الإعدادات</div>
    </aside>

    <section class="main-panel" aria-live="polite">
      <header class="app-header">
        <div class="status">
          <span style="width:10px; height:10px; border-radius:50%; background:#238636; display:inline-block;"></span>
          <div><strong>نظام MARR</strong> <div class="small">جاهز للتفاعل</div></div>
        </div>
        <div class="right small">الإتجاه: <strong>عربي</strong></div>
      </header>

      <div class="chat-area" id="chat-area" role="log" aria-relevant="additions"></div>

      <div class="input-area" role="region" aria-label="منطقة الإدخال">
        <div class="typing small" id="typing" aria-live="polite" style="display:none;">MARR يقوم بالتحليل...</div>
        <input type="text" id="user-input" placeholder="اسأل MARR أي شيء..." aria-label="حقل كتابة الرسالة" autocomplete="off" />
        <button class="send-btn" id="send-btn" aria-label="أرسل الرسالة"><i class="fa-solid fa-paper-plane"></i> إرسال</button>
      </div>
    </section>
  </div>

  <!-- إعدادات / modal -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document">
      <h3>إعدادات MARR</h3>
      <div class="row">
        <label class="small" style="min-width:80px;">API Key:</label>
        <input id="api-key-input" type="password" placeholder="أدخل مفتاح الـ API هنا (لن يُحفَظ في التخزين الدائم)" aria-label="مفتاح API">
      </div>
      <div class="row">
        <label class="small" style="min-width:80px;">نموذج:</label>
        <select id="model-select" style="padding:10px; border-radius:8px; background:transparent; color:var(--text); border:1px solid var(--glass);">
          <option value="gemini-flash-latest">gemini-flash-latest</option>
        </select>
      </div>
      <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
        <button class="btn" id="modal-close">إلغاء</button>
        <button class="btn solid" id="save-settings">حفظ مؤقت</button>
      </div>
      <p class="small" style="margin-top:12px; color:var(--muted);">
        ملاحظة: لأمن أفضل ضَع مفتاح API في خادم وسيط بدلاً من المتصفح. حفظ المفتاح يتم في الجلسة (session) فقط.
      </p>
    </div>
  </div>

  <script>
    // العناصر
    const chatArea = document.getElementById('chat-area');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingEl = document.getElementById('typing');
    const chatListEl = document.getElementById('chat-list');
    const newChatBtn = document.getElementById('new-chat-btn');
    const settingsOpenBtn = document.getElementById('settings-open');
    const modalBackdrop = document.getElementById('modal-backdrop');
    const modalClose = document.getElementById('modal-close');
    const saveSettingsBtn = document.getElementById('save-settings');
    const apiKeyInput = document.getElementById('api-key-input');
    const modelSelect = document.getElementById('model-select');
    const clearStorageBtn = document.getElementById('clear-storage');

    // إعدادات التشغيل
    const API_BASE = "https://generativelanguage.googleapis.com/v1beta/models";
    // المفاتيح تُخزن مؤقتاً في sessionStorage لتسهيل التجريب بالمتصفح
    const SETTINGS_KEY = 'marr_settings_v1';
    const CHATS_KEY = 'marr_chats_v1';

    // marked configuration
    marked.setOptions({ breaks: true });

    // helper: load/save settings
    function loadSettings(){
      try {
        const s = JSON.parse(sessionStorage.getItem(SETTINGS_KEY) || '{}');
        if(s.apiKey) apiKeyInput.value = s.apiKey;
        if(s.model) modelSelect.value = s.model;
        return s;
      } catch(e){ return {}; }
    }
    function saveSettingsToSession(){
      const s = { apiKey: apiKeyInput.value.trim(), model: modelSelect.value };
      sessionStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
      showToast('تم حفظ الإعدادات مؤقتاً في الجلسة');
      closeModal();
    }
    function getApiKey(){
      const s = JSON.parse(sessionStorage.getItem(SETTINGS_KEY) || '{}');
      return s.apiKey || '';
    }
    // toast بسيطة
    function showToast(msg, timeout = 2200){
      const d = document.createElement('div');
      d.textContent = msg;
      d.style.position = 'fixed';
      d.style.left = '50%';
      d.style.transform = 'translateX(-50%)';
      d.style.bottom = '24px';
      d.style.background = 'rgba(0,0,0,0.7)';
      d.style.color = '#fff';
      d.style.padding = '8px 14px';
      d.style.borderRadius = '8px';
      d.style.zIndex = 200;
      document.body.appendChild(d);
      setTimeout(()=> d.remove(), timeout);
    }

    // المحادثات: تخزين محلي بسيط
    function loadChats(){
      try {
        return JSON.parse(localStorage.getItem(CHATS_KEY) || '[]');
      } catch(e){ return []; }
    }
    function saveChats(chats){
      localStorage.setItem(CHATS_KEY, JSON.stringify(chats));
      renderChatList();
    }
    function clearChats(){
      localStorage.removeItem(CHATS_KEY);
      renderChatList();
      chatArea.innerHTML = '';
      showToast('تم حذف كل المحادثات محلياً');
    }

    // واجهة المستخدم للمحادثات
    let chats = loadChats(); // كل محادثة عنصر: {id,title,messages:[{role,text,ts}], created}
    let activeChatId = null;

    function formatTime(ts){
      const d = new Date(ts);
      return d.toLocaleTimeString('ar-EG', {hour:'2-digit',minute:'2-digit'});
    }

    function renderChatList(){
      chatListEl.innerHTML = '';
      chats.forEach(c => {
        const btn = document.createElement('div');
        btn.className = 'chat-item' + (c.id === activeChatId ? ' active' : '');
        btn.role = 'listitem';
        btn.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="font-weight:600;">${escapeHtml(c.title || 'محادثة جديدة')}</div>
          <div class="small">${new Date(c.created).toLocaleDateString('ar-EG')}</div>
        </div>`;
        btn.addEventListener('click', () => openChat(c.id));
        chatListEl.appendChild(btn);
      });
    }

    function createNewChat(title){
      const id = 'c_' + Date.now();
      const chat = { id, title: title || 'محادثة جديدة', messages: [], created: Date.now() };
      chats.unshift(chat);
      saveChats(chats);
      openChat(id);
    }

    function openChat(id){
      activeChatId = id;
      renderChatList();
      const chat = chats.find(c => c.id === id);
      if(!chat) return;
      chatArea.innerHTML = '';
      chat.messages.forEach(m => appendMessageToUI(m.role, m.text, m.ts));
      // scroll to bottom
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function appendMessageToChat(role, text){
      const chat = chats.find(c => c.id === activeChatId);
      if(!chat) {
        createNewChat();
        return appendMessageToChat(role, text);
      }
      const msg = { role, text, ts: Date.now() };
      chat.messages.push(msg);
      saveChats(chats);
      appendMessageToUI(role, text, msg.ts);
    }

    // XSS-safe rendering of Markdown
    function renderMarkdownToSafeHtml(md){
      const raw = marked.parse(md || '');
      // DOMPurify is loaded globally as DOMPurify
      return DOMPurify.sanitize(raw, {ALLOWED_ATTR: ['href','target','class','title','lang','dir']});
    }

    function appendMessageToUI(role, text, ts = Date.now()){
      const wrapper = document.createElement('div');
      wrapper.className = 'message' + (role === 'user' ? ' you' : '');
      const avatar = document.createElement('div');
      avatar.className = 'avatar ' + (role === 'user' ? 'user-avatar' : 'ai-avatar');
      avatar.innerHTML = role === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-bolt"></i>';

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = renderMarkdownToSafeHtml(text);

      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = formatTime(ts);

      bubble.appendChild(meta);
      wrapper.appendChild(avatar);
      wrapper.appendChild(bubble);
      chatArea.appendChild(wrapper);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // utils
    function escapeHtml(s){
      return String(s).replace(/[&<>"']/g, function(m){ return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]; });
    }

    // UI actions
    newChatBtn.addEventListener('click', () => createNewChat('محادثة جديدة'));
    settingsOpenBtn.addEventListener('click', openModal);
    clearStorageBtn.addEventListener('click', ()=> { if(confirm('هل تريد حذف كل المحادثات محلياً؟')) { clearChats(); } });

    function openModal(){
      modalBackdrop.style.display = 'flex';
      modalBackdrop.setAttribute('aria-hidden','false');
      // populate inputs from session
      const s = JSON.parse(sessionStorage.getItem(SETTINGS_KEY) || '{}');
      apiKeyInput.value = s.apiKey || '';
      modelSelect.value = s.model || 'gemini-flash-latest';
    }
    function closeModal(){
      modalBackdrop.style.display = 'none';
      modalBackdrop.setAttribute('aria-hidden','true');
    }
    modalClose.addEventListener('click', closeModal);
    modalBackdrop.addEventListener('click', (e)=> { if(e.target === modalBackdrop) closeModal(); });
    saveSettingsBtn.addEventListener('click', saveSettingsToSession);

    // إرسال رسالة ومعالجة الاستجابة
    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e)=> { if(e.key === 'Enter') sendMessage(); });

    async function sendMessage(){
      const text = userInput.value.trim();
      if(!text) return;
      // إضافة رسالة المستخدم محلياً
      if(!activeChatId) createNewChat();
      appendMessageToChat('user', text);
      userInput.value = '';
      // عرض حالة الطباعة
      typingEl.style.display = 'inline-block';
      sendBtn.disabled = true;

      // قراءة مفتاح الـ API من الجلسة (session)
      const apiKey = getApiKey();
      if(!apiKey){
        showToast('يرجى إدخال مفتاح الـ API في الإعدادات أولا');
        typingEl.style.display = 'none';
        sendBtn.disabled = false;
        return;
      }

      const settings = JSON.parse(sessionStorage.getItem(SETTINGS_KEY) || '{}');
      const model = settings.model || modelSelect.value || 'gemini-flash-latest';
      const url = `${API_BASE}/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(apiKey)}`;

      // إعداد الاستعلام - ضع تعليمات النظام هنا (ممكن تعديلها حسب حاجتك)
      const systemInstruction = `أنت MARR، مساعد ذكي مُحترم ومتخصص. تحدث بالعربية الفصحى باحترام وعمق. إذا طُلب كودًا، قدمه بتنسيق واضح ومفصّل. لا تُعرّف عن مزود الخدمة.`;

      const payload = {
        "contents": [{ "parts": [{ "text": text }] }],
        "systemInstruction": { "parts": [{ "text": systemInstruction }] },
        "generationConfig": { "temperature": 0.7, "maxOutputTokens": 1024 }
      };

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if(!res.ok){
          const errText = await res.text();
          console.error('API error', res.status, errText);
          appendMessageToChat('ai', `عذراً، حدث خطأ في استجابة الخادم (${res.status}).`);
          showToast('خطأ في استدعاء API');
          return;
        }
        const data = await res.json();
        // تحقّق من بنية الاستجابة
        let aiText = '';
        try {
          if(data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            aiText = data.candidates[0].content.parts[0].text;
          } else if (data.output && Array.isArray(data.output) && data.output[0] && data.output[0].content) {
            // دعم أشكال ردّ أخرى إن وُجدت
            aiText = JSON.stringify(data.output[0].content);
          } else {
            aiText = 'تلقيت استجابة غير متوقعة من الخادم.';
            console.warn('Unexpected API shape', data);
          }
        } catch(err){
          console.error(err);
          aiText = 'حدث خطأ في معالجة استجابة الخادم.';
        }

        appendMessageToChat('ai', aiText);

      } catch (err) {
        console.error(err);
        appendMessageToChat('ai', 'عذراً، تعذّر الاتصال بالخدمة. تحقق من اتصالك أو إعدادات الـ API.');
      } finally {
        typingEl.style.display = 'none';
        sendBtn.disabled = false;
      }
    }

    // init: تحميل المحادثات وتهيئة أول محادثة إذا وُجدت
    (function init(){
      // load settings
      loadSettings();
      // load chats
      if(!chats || chats.length === 0){
        // إنشاء محادثة افتراضية
        createNewChat('المحادثة الرئيسية');
      } else {
        renderChatList();
        openChat(chats[0].id);
      }
    })();

    // حفظ تلقائي عند المغادرة
    window.addEventListener('beforeunload', () => {
      // لا نفعل شيئًا حساسًا هنا لأننا نخزن كل شيء فعلاً في localStorage/sessionStorage
    });

    // مساعدة: فتح الإعدادات بواسطة Ctrl+,
    window.addEventListener('keydown', (e) => {
      if((e.ctrlKey || e.metaKey) && e.key === ','){
        e.preventDefault(); openModal();
      }
    });
  </script>
</body>
</html>
