<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARR AI</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, rgba(174, 212, 223, 0.5), rgba(74, 157, 178, 0.5));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            backdrop-filter: blur(10px);
        }
        .container {
            width: 90%;
            max-width: 600px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }
        h1 {
            color: #333;
            text-align: center;
            font-size: 2.5em;
            animation: fadeIn 1s;
        }
        p {
            color: #555;
            text-align: center;
            font-size: 1.2em;
            margin: 10px 0;
            animation: fadeIn 1.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 20px 0;
            background: linear-gradient(45deg, #8e44ad, #f39c12);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: background 0.3s, transform 0.3s;
        }
        .button:hover {
            background: linear-gradient(45deg, #f39c12, #8e44ad);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to MARR AI</h1>
        <p>Experience the future of artificial intelligence.</p>
        <a href="#" class="button">Get Started</a>
    </div>
</body>
</html>
