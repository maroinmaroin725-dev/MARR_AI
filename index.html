<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARR | ذكاء بلا حدود</title>
    
    <!-- الخطوط والمكتبات الخارجية -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        :root {
            --accent: #00f2fe;
            --bg-deep: #02040a;
            --panel: #0d1117;
            --text: #e6edf3;
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /*Sidebar - الجانب الأيسر*/
        .sidebar {
            width: 260px;
            background: var(--panel);
            border-left: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .marr-logo {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 4px;
            color: var(--accent);
            text-align: center;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
        }

        .new-chat-btn {
            background: transparent;
            border: 1px dashed var(--accent);
            color: var(--accent);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .new-chat-btn:hover { background: rgba(0, 242, 254, 0.05); transform: translateY(-2px); }

        /*Main Content - منطقة الدردشة*/
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 40px 15%;
            display: flex;
            flex-direction: column;
            gap: 30px;
            scroll-behavior: smooth;
        }

        /*فقاعات الرسائل*/
        .message {
            max-width: 90%;
            display: flex;
            gap: 20px;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .ai-avatar { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(0, 242, 254, 0.3); }
        .user-avatar { background: #30363d; color: #fff; }

        .content {
            padding-top: 5px;
            line-height: 1.8;
            font-size: 1.05rem;
            width: 100%;
        }

        .content h1, .content h2 { color: var(--accent); margin-top: 20px; }
        .content code { font-family: 'JetBrains Mono', monospace; background: #161b22; padding: 3px 6px; border-radius: 4px; color: #ff79c6; }
        .content pre { background: #0d1117; padding: 20px; border-radius: 12px; overflow-x: auto; border: 1px solid var(--glass-border); }

        /*منطقة الإدخال*/
        .input-wrapper {
            padding: 30px 15%;
            background: linear-gradient(transparent, var(--bg-deep) 30%);
        }

        .input-box {
            background: #161b22;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-box:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 242, 254, 0.1); }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #fff;
            padding: 12px;
            font-size: 1.1rem;
            outline: none;
            font-family: 'Cairo', sans-serif;
        }

        .send-btn {
            background: var(--accent);
            color: #000;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .send-btn:hover { transform: scale(1.1) rotate(-10deg); filter: brightness(1.1); }

        .typing-status {
            font-size: 0.8rem;
            color: var(--accent);
            margin-bottom: 10px;
            display: none;
            font-weight: bold;
        }

        /*Responsive*/
        @media (max-width: 992px) {
            .sidebar { display: none; }
            .chat-area, .input-wrapper { padding-left: 5%; padding-right: 5%; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="marr-logo">MARR</div>
        <button class="new-chat-btn" onclick="location.reload()">
            <i class="fa-solid fa-plus"></i> محادثة جديدة
        </button>
        <div style="margin-top: auto; font-size: 0.7rem; color: #555; text-align: center;">
            إصدار v2.0.4 - Premium
        </div>
    </aside>

    <main class="main-content">
        <header>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 10px; height: 10px; background: #238636; border-radius: 50%;"></div>
                <span style="font-weight: bold; font-size: 0.9rem;">نظام MARR متصل</span>
            </div>
            <i class="fa-solid fa-ellipsis-vertical text-muted"></i>
        </header>

        <div class="chat-area" id="chat-area">
            <!-- الترحيب -->
            <div class="message">
                <div class="avatar ai-avatar"><i class="fa-solid fa-bolt"></i></div>
                <div class="content">مرحباً بك في <b>MARR</b>. أنا ذكاؤك الخاص، كيف يمكنني خدمتك اليوم؟</div>
            </div>
        </div>

        <div class="input-wrapper">
            <div id="typing" class="typing-status">MARR يقوم بالتحليل الآن...</div>
            <div class="input-box">
                <input type="text" id="user-input" placeholder="اسأل MARR أي شيء..." autocomplete="off">
                <button class="send-btn" id="send-btn" onclick="sendMessage()">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </main>

    <script>
        const chatArea = document.getElementById('chat-area');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const typingStatus = document.getElementById('typing');

        const API_KEY = "AIzaSyAgE_Y08zDBzC8rHzz4-WIPBKvxASwcmOg";
        const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent";

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // عرض رسالة المستخدم
            addMessage('user', text);
            userInput.value = '';
            
            // حالة التحميل
            typingStatus.style.display = 'block';
            sendBtn.disabled = true;
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch(`${API_URL}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{ "parts": [{ "text": text }] }],
                        "systemInstruction": {
                            "parts": [{
                                "text": "أنت MARR، مساعد ذكي متطور جداً. هويتك هي MARR فقط. تحدث بالعربية الفصحى بذكاء وعمق. لا تذكر جوجل أو جمناي. إذا طُلب منك كود برمجي، قدمه بأفضل جودة وتنسيق."
                            }]
                        },
                        "generationConfig": { "temperature": 0.8, "maxOutputTokens": 4096 }
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;
                
                addMessage('ai', aiResponse);

            } catch (e) {
                addMessage('ai', "عذراً، واجه نظام MARR تداخلاً في الشبكة. يرجى المحاولة مرة أخرى.");
            } finally {
                typingStatus.style.display = 'none';
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function addMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            
            const avatar = role === 'user' 
                ? '<div class="avatar user-avatar"><i class="fa-solid fa-user"></i></div>' 
                : '<div class="avatar ai-avatar"><i class="fa-solid fa-bolt"></i></div>';
            
            msgDiv.innerHTML = `
                ${avatar}
                <div class="content">${marked.parse(text)}</div>
            `;
            
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // تحسين الـ Markdown للتنسيق البرمجي
        marked.setOptions({
            highlight: function(code) {
                return code; // يمكن إضافة مكتبة highlight.js هنا مستقبلاً
            },
            breaks: true
        });
    </script>
</body>
</html>
