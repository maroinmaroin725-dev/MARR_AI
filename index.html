<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARR-AI — دردشة احترافية</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%233b82f6'/%3E%3Ctext x='50' y='58' font-size='52' text-anchor='middle' font-family='Arial' fill='white'%3EAI%3C/text%3E%3C/svg%3E">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">MARR-AI</a>
    <div id="nav-area" class="d-flex align-items-center"></div>
  </div>
</nav>

<main class="container py-4">
  <div class="row">
    <div class="col-md-4 mb-3">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h6 class="mb-0">المحادثات</h6>
            <div>
              <button id="newConvBtn" class="btn btn-sm btn-outline-primary"><i class="fa-solid fa-plus"></i></button>
              <button id="exportAllBtn" class="btn btn-sm btn-outline-secondary" title="تصدير كل المحادثات"><i class="fa-solid fa-file-export"></i></button>
            </div>
          </div>
          <input id="searchInput" class="form-control form-control-sm mb-2" placeholder="بحث في المحادثات/الرسائل..." />
          <ul id="conversationsList" class="list-group flex-grow-1 overflow-auto"></ul>
        </div>
      </div>
    </div>

    <div class="col-md-8">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <div id="chatHeader" class="mb-3 d-flex align-items-center gap-3 justify-content-between"></div>
          <div id="chat" class="flex-grow-1 overflow-auto p-3 mb-3"></div>

          <form id="chatForm" class="d-flex gap-2">
            <input id="inputText" class="form-control" placeholder="اكتب رسالة..." autocomplete="off" />
            <button class="btn btn-primary" type="submit"><i class="fa-solid fa-paper-plane"></i> إرسال</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="/main.js"></script>
</body>
</html>
