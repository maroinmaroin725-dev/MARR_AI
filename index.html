<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MARR | ذكاء بلا حدود</title>

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/2.4.0/purify.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <link rel="stylesheet" href="styles.css">
  <meta name="referrer" content="no-referrer">
</head>
<body>
  <div class="app" role="application" aria-label="MARR Chat Application">
    <aside class="sidebar" id="sidebar" aria-label="القائمة الجانبية">
      <div class="sidebar-top">
        <div class="marr-logo">MARR</div>
        <button id="toggle-sidebar" class="icon-btn" title="إظهار/إخفاء القائمة"><i class="fa-solid fa-bars"></i></button>
      </div>

      <div class="controls" role="region" aria-label="عناصر التحكم">
        <button class="btn solid" id="new-chat-btn"><i class="fa-solid fa-plus"></i> محادثة جديدة</button>
        <button class="btn" id="settings-open"><i class="fa-solid fa-gear"></i> الإعدادات</button>
        <button class="btn" id="export-chats"><i class="fa-solid fa-file-export"></i> تصدير</button>
        <button class="btn" id="import-chats"><i class="fa-solid fa-file-import"></i> استيراد</button>
        <input id="import-file" type="file" accept=".json" style="display:none">
        <button class="btn" id="clear-storage"><i class="fa-solid fa-trash"></i> حذف الكل</button>
      </div>

      <div class="search-wrap">
        <input id="search-input" placeholder="بحث في المحادثات..." class="search" />
      </div>

      <div class="chat-list" id="chat-list" role="list" aria-label="قائمة المحادثات"></div>

      <div class="sidebar-footer">نسخة محلية — ارفع ملف المفتاح في الإعدادات</div>
    </aside>

    <section class="main-panel" aria-live="polite">
      <header class="app-header">
        <div class="status"><span class="status-dot"></span> <strong>نظام MARR</strong> <span class="small">جاهز</span></div>
        <div class="right small">الاتجاه: <strong>عربي</strong></div>
      </header>

      <div class="chat-area" id="chat-area" role="log" aria-relevant="additions"></div>

      <div class="input-area" role="region" aria-label="منطقة الإدخال">
        <div class="typing small" id="typing" aria-live="polite" style="display:none;">MARR يقوم بالتحليل...</div>
        <input type="text" id="user-input" placeholder="اسأل MARR أي شيء..." aria-label="حقل كتابة الرسالة" autocomplete="off" />
        <button class="send-btn" id="send-btn" aria-label="أرسل الرسالة"><i class="fa-solid fa-paper-plane"></i> إرسال</button>
      </div>
    </section>
  </div>

  <!-- إعدادات modal (رفع ملفات فقط) -->
  <div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document">
      <h3>إعدادات MARR</h3>

      <div class="row">
        <label class="small">مزود الخدمة:</label>
        <select id="provider-select">
          <option value="google">Google Generative</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>

      <hr>

      <div class="row">
        <label class="small">ارفع ملف مفتاح Google (txt/json):</label>
        <input id="google-file" type="file" accept=".txt,.json" />
      </div>

      <div class="row">
        <label class="small">ارفع ملف مفتاح OpenAI (txt/json):</label>
        <input id="openai-file" type="file" accept=".txt,.json" />
      </div>

      <div class="row">
        <label class="small">كلمة مرور لتشفير المفاتيح (اختياري لكن موصى):</label>
        <input id="enc-pass" type="password" placeholder="أدخل كلمة مرور لتشفير المفتاح محلياً" />
      </div>

      <div style="display:flex; gap:8px; justify-content:flex-end;">
        <button class="btn" id="modal-close">إغلاق</button>
        <button class="btn solid" id="save-keys">حفظ المفاتيح</button>
      </div>

      <p class="small" style="margin-top:12px; color:var(--muted);">
        التعليمات: ارفع ملف المفتاح الخاص بكل مزود. عند الحفظ سيُطلب منك كلمة مرور لتشفير المفاتيح محلياً (محسّن للأمان). لن يتم رفع أي شيء إلى خوادم خارجية.
      </p>
    </div>
  </div>

  <script src="storage.js"></script>
  <script src="app.js"></script>
</body>
</html>
